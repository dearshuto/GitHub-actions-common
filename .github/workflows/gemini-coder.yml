name: Gemini Auto Coder

on:
  workflow_call:
  issues:
    types: [labeled]
    # 呼び出し側から Secrets を受け取る宣言
    secrets:
      GEMINI_API_KEY:
        required: true  
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Target Issue Number"
        required: true
      issue_title:
        description: "Issue Title"
        required: true
      issue_body:
        description: "Issue Content"
        required: true

jobs:
  auto-pr:
    if: >
      (github.event.label.name == 'gemini-fix') ||
      github.event_name == 'workflow_dispatch'    
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: develop

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Gemini CLI
        run: npm install -g @google/gemini-cli

      - name: Run Gemini to fix issue
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # ラベル経由か手動入力か、値がある方を採用する (bashの ${A:-$B} 構文)
          ISSUE_NUM="${{ github.event.issue.number }}${{ github.event.inputs.issue_number }}"
          ISSUE_TITLE="${{ github.event.issue.title }}${{ github.event.inputs.issue_title }}"
          ISSUE_BODY="${{ github.event.issue.body }}${{ github.event.inputs.issue_body }}"

          # -p: 非対話モードでプロンプトを実行
          # -y: 全てのアクション（ファイル編集・保存）を自動で許可（YOLOモード）
          gemini -y --model gemini-2.5-flash -p "あなたはシニアエンジニアです。Issue #$ISSUE_NUM: $ISSUE_TITLE を解決するために、現在のコードを分析し、必要なファイルを直接修正して保存してください。内容: $ISSUE_BODY"
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: develop
          commit-message: "fix: automated fix by Gemini"
          title: "Gemini: Fix for Issue #${{ github.event.issue.number }}${{ github.event.inputs.issue_number }}"
          body: "This PR was automatically generated by Gemini CLI."
          branch: "gemini-fix-${{ github.event.issue.number }}${{ github.event.inputs.issue_number }}"
