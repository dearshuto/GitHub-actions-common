name: Gemini Auto Coder

on:
  workflow_call:
  issues:
    types: [labeled]
    # 呼び出し側から Secrets を受け取る宣言
    secrets:
      GEMINI_API_KEY:
        required: true  
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Target Issue Number"
        required: true
      issue_title:
        description: "Issue Title"
        required: true
      issue_body:
        description: "Issue Content"
        required: true

jobs:
  auto-pr:
    if: >
      (github.event.label.name == 'gemini-fix') ||
      github.event_name == 'workflow_dispatch'    
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: develop

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Gemini CLI
        run: npm install -g @google/gemini-cli

      - name: Run Gemini to fix issue
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ISSUE_NUM: ${{ github.event.issue.number }}${{ github.event.inputs.issue_number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}${{ github.event.inputs.issue_title }}
          ISSUE_BODY: ${{ github.event.issue.body }}${{ github.event.inputs.issue_body }}        
        run: |
          # 1. プロンプトの組み立て
          # シェルの変数代入ではなく、GitHub Actionsの構文で直接組み立てて環境変数に入れる
          gemini -y --model gemini-2.5-flash -p "$(cat <<EOF
          You are an expert Senior Systems Programmer.
          Your task is to resolve Issue #$ISSUE_NUM: "$ISSUE_TITLE".
          ### Instructions:
          1. Analyze the current codebase and the details provided in the Issue.
          2. Directly modify and save the necessary files within the repository to fix the issue.
          3. Ensure the fix is consistent with the project's architecture and existing coding style.          
          ### Issue Content:
          $ISSUE_BODY
          EOF
          )"
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: develop
          commit-message: "fix: automated fix by Gemini"
          title: "Gemini: Fix for Issue #${{ github.event.issue.number }}${{ github.event.inputs.issue_number }}"
          body: |
            This PR was automatically generated by Gemini CLI.            
            Closes #${{ github.event.issue.number }}${{ github.event.inputs.issue_number }}
          branch: "gemini-fix-${{ github.event.issue.number }}${{ github.event.inputs.issue_number }}"
